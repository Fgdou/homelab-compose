services:
  nextcloud:
    networks:
      - nas
    image: nextcloud:32.0.3
    volumes:
      - /data/nextcloud/code:/var/www/html
    environment:
      - APACHE_DISABLE_REWRITE_IP=true
      - TRUSTED_PROXIES=10.0.0.0/8 172.16.0.0/8
      - OVERWRITEHOST=nextcloud.fgdou.ovh
      - OVERWRITEPROTOCOL=https
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - POSTGRES_HOST=postgres
      - PHP_MEMORY_LIMIT=1024M
      - PHP_UPLOAD_LIMIT=1024M
      - REDIS_HOST=redis
    restart: unless-stopped
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.nextcloud.rule=Host(`nextcloud.fgdou.ovh`)'
      - 'traefik.http.routers.nextcloud.entryPoints=websecure'
      - 'traefik.http.services.nextcloud.loadbalancer.server.port=80'
    command: >
      /bin/sh -c '
      until curl -fsS https://auth.fgdou.ovh/-/health/ready/; do
        echo "Waiting for oauth2...";
        sleep 5;
      done;
      exec apache2-foreground
      '

networks:
  nas:
    external: true
