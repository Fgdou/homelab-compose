services:
  postgres:
    image: postgres:18
    container_name: postgres
    hostname: postgres
    volumes:
      - /home/fgdou/postgres:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_ADMIN_PASSWORD}
      - POSTGRES_USER=admin
    networks:
      - nas
    restart: unless-stopped
  adminer:
    image: adminer
    networks:
      - nas
    ports:
      - 8080:8080
    restart: unless-stopped

networks:
  nas:
    external: true
